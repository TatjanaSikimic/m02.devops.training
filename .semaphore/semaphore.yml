version: v1.0
name: "\U0001F40D Python CI/CD Pipeline"
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
auto_cancel:
  queued:
    when: 'true'
fail_fast:
  cancel:
    when: branch != 'main'
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
      - checkout
      - mkdir -p .pip_cache
blocks:
  - name: "\U0001F4E6 Install Dependencies"
    dependencies: []
    task:
      jobs:
        - name: "\U0001F4E6 Install dependencies"
          commands:
            - cache restore
            - pip install pytest requests flask coverage locust
            - cache store
      agent:
        machine:
          type: e1-standard-2
          os_image: ''
after_pipeline:
  task:
    jobs:
      - name: "\U0001F4CA Merge reports"
        commands:
          - test-results gen-pipeline-report
